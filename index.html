document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"c0634246-bdb7-4edc-80d6-6fc5b1d99afa\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0}\n  @media print{\n    .no-print{display:none !important;}\n    body{background:#fff !important;}\n    .table-wrap{overflow:visible !important;border:none !important;border-radius:0 !important;}\n    .app-root{background:#fff !important;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"app-root\" style=\"--accent:{{ accent }};--rowh:{{ rowH }}px;--padc:{{ padc }}px;font-family:'Helvetica Neue',Helvetica,Arial,system-ui,sans-serif;color:#1e293b;background:#f1f5f9;min-height:100vh\">\n\n  <div class=\"no-print\" style=\"background:var(--accent);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n    <div>\n      <div style=\"font-size:18px;font-weight:700;letter-spacing:-.01em\">Planificador de turnos sabatinos<\u002Fdiv>\n      <div style=\"font-size:12.5px;opacity:.85;margin-top:2px\">Asignación de turnos para los sábados · Enero – Junio 2026<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px\">\n      <button type=\"button\" onclick=\"{{ onPlan }}\" style=\"padding:8px 16px;border-radius:8px;border:none;font:600 13px/1 inherit;cursor:pointer;{{ navPlanStyle }}\">Planificación<\u002Fbutton>\n      <button type=\"button\" onclick=\"{{ onTeam }}\" style=\"padding:8px 16px;border-radius:8px;border:none;font:600 13px/1 inherit;cursor:pointer;{{ navTeamStyle }}\">Colaboradores<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ isPlan }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"padding:22px 24px 40px\">\n\n    <div class=\"no-print\" style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px\">\n      <sc-for list=\"{{ monthTabs }}\" as=\"t\" hint-placeholder-count=\"6\">\n        <button type=\"button\" onclick=\"{{ t.onClick }}\" style=\"padding:7px 14px;border-radius:999px;font:600 12.5px/1 inherit;cursor:pointer;{{ t.style }}\">{{ t.name }}<\u002Fbutton>\n      <\u002Fsc-for>\n      <div style=\"flex:1;min-width:12px\"><\u002Fdiv>\n      <button type=\"button\" onclick=\"{{ autoPlan }}\" style=\"padding:9px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;font:600 13px/1 inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px\" style-hover=\"filter:brightness(1.06)\"><span style=\"font-size:14px\">✦<\u002Fspan>Sugerir planificación<\u002Fbutton>\n      <button type=\"button\" onclick=\"{{ clearMonth }}\" style=\"padding:9px 14px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#334155;font:600 13px/1 inherit;cursor:pointer\" style-hover=\"background:#f8fafc\">Limpiar mes<\u002Fbutton>\n      <button type=\"button\" onclick=\"{{ doPrint }}\" style=\"padding:9px 14px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#334155;font:600 13px/1 inherit;cursor:pointer\" style-hover=\"background:#f8fafc\">Imprimir / PDF<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;gap:10px;background:{{ bannerBg }};color:{{ bannerColor }};border:1px solid {{ bannerBorder }};border-radius:9px;padding:10px 14px;font-size:13px;font-weight:500;margin-bottom:14px\">\n      <span style=\"width:8px;height:8px;border-radius:50%;background:{{ bannerColor }};flex:none\"><\u002Fspan>\n      <span>{{ bannerText }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"no-print\" style=\"display:flex;flex-wrap:wrap;gap:16px 18px;align-items:center;margin-bottom:14px;font-size:12px;color:#475569\">\n      <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:18px;height:14px;border-radius:4px;background:#fef3c7;border:1px solid #fcd34d\"><\u002Fspan>AM · 8:00–13:00<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:18px;height:14px;border-radius:4px;background:#dbeafe;border:1px solid #93c5fd\"><\u002Fspan>PM · 12:00–17:00<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:18px;height:14px;border-radius:4px;background:#ede9fe;border:1px solid #c4b5fd\"><\u002Fspan>Completo · 8:00–17:00<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:18px;height:14px;border-radius:4px;background:#f1f5f9;border:1px solid #e2e8f0\"><\u002Fspan>Libre<\u002Fspan>\n      <span style=\"width:1px;height:16px;background:#e2e8f0\"><\u002Fspan>\n      <span style=\"color:#94a3b8\">Clic en una celda para cambiar el turno<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"table-wrap\" style=\"overflow:auto;background:#fff;border:1px solid #e2e8f0;border-radius:11px;box-shadow:0 1px 2px rgba(15,23,42,.04)\">\n      <sc-for list=\"{{ saturdays }}\" as=\"sat\" hint-placeholder-count=\"5\">\n              <\u002Fsc-for><sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"12\">\n            <\u002Fsc-for><sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"5\">\n                <\u002Fsc-for><sc-for list=\"{{ saturdays }}\" as=\"sat\" hint-placeholder-count=\"5\">\n              <\u002Fsc-for><table style=\"border-collapse:collapse;width:100%;font-size:13px;font-variant-numeric:tabular-nums\">\n        <thead>\n          <tr style=\"background:#f8fafc\">\n            <th style=\"text-align:left;padding:11px 14px;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0;white-space:nowrap\">Colaborador<\u002Fth>\n            <th style=\"text-align:left;padding:11px 12px;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0;white-space:nowrap\">Rol<\u002Fth>\n            <th style=\"padding:8px 6px;text-align:center;border-bottom:1px solid #e2e8f0;border-left:1px solid #eef2f7;min-width:74px\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\">\n                  <span style=\"font-weight:700;color:#334155;font-size:12.5px\">{{ sat.label }}<\u002Fspan>\n                  <sc-if value=\"{{ sat.isQ }}\" hint-placeholder-val=\"{{ true }}\">\n                    <span style=\"font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#b45309;background:#fffbeb;border:1px solid #fde68a;padding:1px 5px;border-radius:999px\">Quincena<\u002Fspan>\n                  <\u002Fsc-if>\n                  <span style=\"width:7px;height:7px;border-radius:50%;background:{{ sat.headDot }}\"><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fth>\n            \n            <th style=\"padding:11px 10px;text-align:center;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0;border-left:1px solid #eef2f7\">Libres<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #f1f5f9\" style-hover=\"background:#f8fafc\">\n              <td style=\"padding:6px 14px;white-space:nowrap;font-weight:600;color:#1e293b\">\n                <span style=\"display:inline-flex;align-items:center;gap:7px\">\n                  {{ row.name }}\n                  <sc-if value=\"{{ row.isVirtual }}\" hint-placeholder-val=\"{{ true }}\">\n                    <span style=\"font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe;padding:1px 5px;border-radius:999px\">Virtual<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fspan>\n              <\u002Ftd>\n              <td style=\"padding:6px 12px;white-space:nowrap\">\n                <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:12px;color:#475569\">\n                  <span style=\"width:8px;height:8px;border-radius:50%;background:{{ row.roleDot }};flex:none\"><\u002Fspan>{{ row.roleLabel }}\n                <\u002Fspan>\n              <\u002Ftd>\n              <td style=\"padding:var(--padc);text-align:center;border-left:1px solid #f1f5f9\">\n                  <button type=\"button\" onclick=\"{{ cell.onClick }}\" title=\"{{ cell.full }}\" style=\"width:100%;min-width:58px;height:var(--rowh);border-radius:7px;border:1px solid {{ cell.border }};background:{{ cell.bg }};color:{{ cell.fg }};font:600 12px/1 inherit;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"filter:brightness(.97)\">{{ cell.label }}<\u002Fbutton>\n                <\u002Ftd>\n              \n              <td style=\"text-align:center;padding:6px 10px;font-weight:700;border-left:1px solid #f1f5f9;color:{{ row.libreColor }}\">{{ row.libre }}<\u002Ftd>\n            <\u002Ftr>\n          \n        <\u002Ftbody>\n        <tfoot>\n          <tr style=\"background:#f8fafc;border-top:2px solid #e2e8f0\">\n            <td style=\"padding:9px 14px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap\">Cobertura<\u002Ftd>\n            <td><\u002Ftd>\n            <td style=\"padding:7px 6px;border-left:1px solid #f1f5f9;text-align:center;vertical-align:top\">\n                <div style=\"font-size:10px;color:#94a3b8;line-height:1.5\">{{ sat.countsText }}<\u002Fdiv>\n                <div style=\"font-size:10.5px;font-weight:600;margin-top:3px;line-height:1.35;color:{{ sat.statusColor }}\">{{ sat.statusText }}<\u002Fdiv>\n              <\u002Ftd>\n            \n            <td><\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftfoot>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:12px;font-size:11.5px;color:#94a3b8;line-height:1.6\">\n      Reglas aplicadas: cada turno (mañana y tarde) debe tener al menos un vendedor y al menos un colaborador presencial · cada colaborador tiene un sábado libre al mes · en los sábados de quincena (más cercano al 15 y al 30) se prioriza tener contabilidad en turno.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isTeam }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"padding:22px 24px 40px;max-width:840px\">\n    <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px\">\n      <sc-for list=\"{{ roleCounts }}\" as=\"rc\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:9px 15px;display:flex;align-items:center;gap:9px;font-size:13px;color:#475569\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:{{ rc.dot }}\"><\u002Fspan>{{ rc.role }}<strong style=\"color:#1e293b;font-size:15px\">{{ rc.count }}<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"background:#fffbeb;border:1px solid #fde68a;color:#92620a;border-radius:9px;padding:10px 14px;font-size:12.5px;margin-bottom:16px\">\n      En cada turno debe haber al menos un vendedor y al menos un colaborador <strong>presencial<\u002Fstrong> — mantén suficiente personal de <strong>Ventas<\u002Fstrong> y en sitio para cubrir mañana y tarde.\n    <\u002Fdiv>\n\n    <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:11px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04)\">\n      <sc-for list=\"{{ teamRows }}\" as=\"c\" hint-placeholder-count=\"12\">\n            <\u002Fsc-for><table style=\"border-collapse:collapse;width:100%;font-size:13.5px\">\n        <thead>\n          <tr style=\"background:#f8fafc\">\n            <th style=\"text-align:left;padding:11px 16px;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0\">Nombre<\u002Fth>\n            <th style=\"text-align:left;padding:11px 16px;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0\">Rol<\u002Fth>\n            <th style=\"text-align:left;padding:11px 16px;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e2e8f0\">Modalidad<\u002Fth>\n            <th style=\"width:90px;border-bottom:1px solid #e2e8f0\"><\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr style=\"border-bottom:1px solid #f1f5f9\">\n              <td style=\"padding:7px 16px\">\n                <input type=\"text\" value=\"{{ c.name }}\" oninput=\"{{ c.onName }}\" style=\"width:100%;max-width:280px;padding:8px 10px;border:1px solid #e2e8f0;border-radius:7px;font:500 13.5px/1 inherit;color:#1e293b;background:#fff\" style-focus=\"border-color:var(--accent);outline:none\">\n              <\u002Ftd>\n              <td style=\"padding:7px 16px\">\n                <span style=\"display:inline-flex;align-items:center;gap:8px\">\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:{{ c.roleDot }};flex:none\"><\u002Fspan>\n                  <select value=\"{{ c.role }}\" onchange=\"{{ c.onRole }}\" style=\"padding:8px 10px;border:1px solid #e2e8f0;border-radius:7px;font:500 13.5px/1 inherit;color:#1e293b;background:#fff;cursor:pointer\">\n                    <option value=\"Ventas\">Ventas<\u002Foption>\n                    <option value=\"Soporte\">Soporte<\u002Foption>\n                    <option value=\"Contabilidad\">Contabilidad<\u002Foption>\n                    <option value=\"Administración\">Administración<\u002Foption>\n                  <\u002Fselect>\n                <\u002Fspan>\n              <\u002Ftd>\n              <td style=\"padding:7px 16px\">\n                <select value=\"{{ c.modality }}\" onchange=\"{{ c.onMod }}\" style=\"padding:8px 10px;border:1px solid #e2e8f0;border-radius:7px;font:500 13.5px/1 inherit;color:#1e293b;background:#fff;cursor:pointer\">\n                  <option value=\"Presencial\">Presencial<\u002Foption>\n                  <option value=\"Virtual\">Virtual<\u002Foption>\n                <\u002Fselect>\n              <\u002Ftd>\n              <td style=\"padding:7px 16px;text-align:right\">\n                <button type=\"button\" onclick=\"{{ c.onDelete }}\" title=\"Eliminar colaborador\" style=\"padding:7px 12px;border:1px solid #fecaca;background:#fff;color:#dc2626;border-radius:7px;font:600 12.5px/1 inherit;cursor:pointer\" style-hover=\"background:#fef2f2\">Eliminar<\u002Fbutton>\n              <\u002Ftd>\n            <\u002Ftr>\n          \n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:16px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;background:#fff;border:1px dashed #cbd5e1;border-radius:10px;padding:13px 15px\">\n      <input type=\"text\" value=\"{{ newName }}\" oninput=\"{{ onNewName }}\" placeholder=\"Nombre del colaborador\" style=\"flex:1;min-width:180px;padding:9px 12px;border:1px solid #e2e8f0;border-radius:7px;font:500 13.5px/1 inherit;background:#fff\" style-focus=\"border-color:var(--accent);outline:none\">\n      <select value=\"{{ newRole }}\" onchange=\"{{ onNewRole }}\" style=\"padding:9px 12px;border:1px solid #e2e8f0;border-radius:7px;font:500 13.5px/1 inherit;background:#fff;cursor:pointer\">\n        <option value=\"Ventas\">Ventas<\u002Foption>\n        <option value=\"Soporte\">Soporte<\u002Foption>\n        <option value=\"Contabilidad\">Contabilidad<\u002Foption>\n        <option value=\"Administración\">Administración<\u002Foption>\n      <\u002Fselect>\n      <select value=\"{{ newModality }}\" onchange=\"{{ onNewModality }}\" style=\"padding:9px 12px;border:1px solid #e2e8f0;border-radius:7px;font:500 13.5px/1 inherit;background:#fff;cursor:pointer\">\n        <option value=\"Presencial\">Presencial<\u002Foption>\n        <option value=\"Virtual\">Virtual<\u002Foption>\n      <\u002Fselect>\n      <button type=\"button\" onclick=\"{{ addCollab }}\" style=\"padding:9px 18px;border:none;background:var(--accent);color:#fff;border-radius:7px;font:600 13.5px/1 inherit;cursor:pointer\" style-hover=\"filter:brightness(1.06)\">Agregar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot;},\n  &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#15803d&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Estilo&quot;, &quot;options&quot;: [&quot;#15803d&quot;, &quot;#0f766e&quot;, &quot;#166534&quot;, &quot;#047857&quot;]},\n  &quot;coloredShifts&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Estilo&quot;},\n  &quot;compact&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Estilo&quot;}\n}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'plan',\n    monthIndex: 0,\n    collaborators: this.defaultCollaborators(),\n    schedule: {},\n    newName: '',\n    newRole: 'Ventas',\n    newModality: 'Presencial',\n  };\n\n  pad(n){ return String(n).padStart(2,'0'); }\n\n  months(){\n    return [\n      {name:'Enero', year:2026, month:0},\n      {name:'Febrero', year:2026, month:1},\n      {name:'Marzo', year:2026, month:2},\n      {name:'Abril', year:2026, month:3},\n      {name:'Mayo', year:2026, month:4},\n      {name:'Junio', year:2026, month:5},\n    ];\n  }\n\n  defaultCollaborators(){\n    return [\n      {id:'c1', name:'Ana Morales', role:'Ventas', modality:'Presencial'},\n      {id:'c2', name:'Carlos Ruiz', role:'Ventas', modality:'Presencial'},\n      {id:'c3', name:'Diana Vega', role:'Ventas', modality:'Presencial'},\n      {id:'c4', name:'Eduardo Soto', role:'Ventas', modality:'Virtual'},\n      {id:'c5', name:'Fernanda Lara', role:'Ventas', modality:'Presencial'},\n      {id:'c6', name:'Gabriel Ponce', role:'Soporte', modality:'Presencial'},\n      {id:'c7', name:'Helena Cruz', role:'Soporte', modality:'Virtual'},\n      {id:'c8', name:'Ignacio Mora', role:'Soporte', modality:'Presencial'},\n      {id:'c9', name:'Julia Ramos', role:'Contabilidad', modality:'Presencial'},\n      {id:'c10', name:'Kevin Díaz', role:'Contabilidad', modality:'Virtual'},\n      {id:'c11', name:'Lucía Fuentes', role:'Administración', modality:'Presencial'},\n      {id:'c12', name:'Marco Tovar', role:'Administración', modality:'Virtual'},\n    ];\n  }\n\n  roleMeta(role){\n    const m = {\n      'Ventas':{dot:'#16a34a'},\n      'Soporte':{dot:'#2563eb'},\n      'Contabilidad':{dot:'#d97706'},\n      'Administración':{dot:'#64748b'},\n    };\n    return m[role] || {dot:'#94a3b8'};\n  }\n\n  getSaturdays(y,m){\n    const last = new Date(y, m+1, 0).getDate();\n    const out = [];\n    for(let d=1; d<=last; d++){\n      const dt = new Date(y,m,d);\n      if(dt.getDay()===6){\n        out.push({ key:`${y}-${this.pad(m+1)}-${this.pad(d)}`, day:d, label:'Sáb '+d });\n      }\n    }\n    return out;\n  }\n\n  quincenaKeys(y,m){\n    const sats = this.getSaturdays(y,m);\n    const last = new Date(y, m+1, 0).getDate();\n    const t1 = 15, t2 = Math.min(30, last);\n    let s1=null,s2=null,b1=Infinity,b2=Infinity;\n    sats.forEach(s=>{\n      if(Math.abs(s.day-t1)<b1){ b1=Math.abs(s.day-t1); s1=s.key; }\n      if(Math.abs(s.day-t2)<b2){ b2=Math.abs(s.day-t2); s2=s.key; }\n    });\n    return new Set([s1,s2].filter(Boolean));\n  }\n\n  shiftStyle(sh, colored){\n    const C = {\n      AM:{bg:'#fef3c7',fg:'#92400e',border:'#fcd34d',label:'AM',full:'Turno AM · 8:00–13:00'},\n      PM:{bg:'#dbeafe',fg:'#1e40af',border:'#93c5fd',label:'PM',full:'Turno PM · 12:00–17:00'},\n      COMPLETO:{bg:'#ede9fe',fg:'#5b21b6',border:'#c4b5fd',label:'Comp.',full:'Turno Completo · 8:00–17:00'},\n      LIBRE:{bg:'#f1f5f9',fg:'#64748b',border:'#e2e8f0',label:'Libre',full:'Turno Libre'},\n    };\n    const M = {\n      AM:{bg:'#f8fafc',fg:'#334155',border:'#e2e8f0',label:'AM',full:'Turno AM · 8:00–13:00'},\n      PM:{bg:'#f1f5f9',fg:'#334155',border:'#e2e8f0',label:'PM',full:'Turno PM · 12:00–17:00'},\n      COMPLETO:{bg:'#e2e8f0',fg:'#1e293b',border:'#cbd5e1',label:'Comp.',full:'Turno Completo · 8:00–17:00'},\n      LIBRE:{bg:'#ffffff',fg:'#94a3b8',border:'#e2e8f0',label:'Libre',full:'Turno Libre'},\n    };\n    if(sh==null) return {bg:'#ffffff',fg:'#cbd5e1',border:'#e2e8f0',label:'+',full:'Sin asignar — clic para asignar'};\n    return (colored?C:M)[sh];\n  }\n\n  cycleCell(satKey, cid){\n    this.setState(s=>{\n      const sched = {...s.schedule};\n      const mo = {...(sched[s.monthIndex]||{})};\n      const day = {...(mo[satKey]||{})};\n      const cur = day[cid] ?? null;\n      let next;\n      if(cur==null) next='AM';\n      else if(cur==='AM') next='PM';\n      else if(cur==='PM') next='COMPLETO';\n      else if(cur==='COMPLETO') next='LIBRE';\n      else next='AM';\n      day[cid]=next; mo[satKey]=day; sched[s.monthIndex]=mo;\n      return {schedule:sched};\n    });\n  }\n\n  leastShift(counts){\n    let m='AM';\n    if(counts.PM<counts[m]) m='PM';\n    if(counts.COMPLETO<counts[m]) m='COMPLETO';\n    return m;\n  }\n\n  assignSat(workers, isQ){\n    const res = {};\n    const counts = {AM:0,PM:0,COMPLETO:0};\n    const ventas = workers.filter(c=>c.role==='Ventas');\n    const rest = workers.filter(c=>c.role!=='Ventas');\n    if(ventas.length===1){\n      res[ventas[0].id]='COMPLETO'; counts.COMPLETO++;\n    } else if(ventas.length>=2){\n      res[ventas[0].id]='AM'; counts.AM++;\n      res[ventas[1].id]='PM'; counts.PM++;\n      ventas.slice(2).forEach(v=>{ const sh=this.leastShift(counts); res[v.id]=sh; counts[sh]++; });\n    }\n    if(isQ){\n      const contab = rest.filter(c=>c.role==='Contabilidad' && !res[c.id]);\n      if(contab.length){ res[contab[0].id]='COMPLETO'; counts.COMPLETO++; }\n    }\n    rest.forEach(c=>{ if(!res[c.id]){ const sh=this.leastShift(counts); res[c.id]=sh; counts[sh]++; } });\n    // Al menos un colaborador presencial cubriendo mañana y tarde\n    const pres = workers.filter(c=>c.modality==='Presencial');\n    if(pres.length){\n      const hasAm = pres.some(c=>res[c.id]==='AM'||res[c.id]==='COMPLETO');\n      const hasPm = pres.some(c=>res[c.id]==='PM'||res[c.id]==='COMPLETO');\n      if(!hasAm || !hasPm){\n        const cand = pres.find(c=>res[c.id]!=='COMPLETO') || pres[0];\n        res[cand.id]='COMPLETO';\n      }\n    }\n    return res;\n  }\n\n  buildPlan(){\n    const cm = this.months()[this.state.monthIndex];\n    const sats = this.getSaturdays(cm.year, cm.month);\n    const qset = this.quincenaKeys(cm.year, cm.month);\n    const collabs = this.state.collaborators;\n    const month = {};\n    sats.forEach(s=> month[s.key]={});\n\n    // Un sábado libre al mes por colaborador, balanceando y respetando quincena para contabilidad\n    const libreCount = {}; sats.forEach(s=> libreCount[s.key]=0);\n    const libreOf = {};\n    collabs.forEach((c,i)=>{\n      let elig = sats.filter(s=> !(c.role==='Contabilidad' && qset.has(s.key)));\n      if(elig.length===0) elig = sats.slice();\n      const off = i % elig.length;\n      const rot = elig.slice(off).concat(elig.slice(0,off));\n      let best=rot[0], bestScore=Infinity;\n      rot.forEach(s=>{ if(libreCount[s.key]<bestScore){ bestScore=libreCount[s.key]; best=s; } });\n      libreOf[c.id]=best.key; libreCount[best.key]++;\n    });\n\n    sats.forEach(s=>{\n      const workers = collabs.filter(c=> libreOf[c.id]!==s.key);\n      const res = this.assignSat(workers, qset.has(s.key));\n      collabs.forEach(c=>{\n        month[s.key][c.id] = (libreOf[c.id]===s.key) ? 'LIBRE' : (res[c.id] || 'AM');\n      });\n    });\n    return month;\n  }\n\n  autoPlan(){\n    const month = this.buildPlan();\n    this.setState(s=>({ schedule:{...s.schedule, [s.monthIndex]:month} }));\n  }\n\n  clearMonth(){\n    this.setState(s=>{ const sc={...s.schedule}; delete sc[s.monthIndex]; return {schedule:sc}; });\n  }\n\n  addCollab(){\n    const name = (this.state.newName||'').trim();\n    if(!name) return;\n    const c = {id:'c'+Date.now(), name, role:this.state.newRole, modality:this.state.newModality};\n    this.setState(s=>({ collaborators:[...s.collaborators, c], newName:'' }));\n  }\n  deleteCollab(id){ this.setState(s=>({ collaborators:s.collaborators.filter(c=>c.id!==id) })); }\n  setCollabName(id,name){ this.setState(s=>({ collaborators:s.collaborators.map(c=>c.id===id?{...c,name}:c) })); }\n  setCollabRole(id,role){ this.setState(s=>({ collaborators:s.collaborators.map(c=>c.id===id?{...c,role}:c) })); }\n  setCollabModality(id,modality){ this.setState(s=>({ collaborators:s.collaborators.map(c=>c.id===id?{...c,modality}:c) })); }\n\n  renderVals(){\n    const accent = this.props.accentColor ?? '#15803d';\n    const colored = this.props.coloredShifts ?? true;\n    const compact = this.props.compact ?? false;\n    const rowH = compact ? 30 : 36;\n    const padc = compact ? 2 : 4;\n\n    const cm = this.months()[this.state.monthIndex];\n    const sats = this.getSaturdays(cm.year, cm.month);\n    const qset = this.quincenaKeys(cm.year, cm.month);\n    const collabs = this.state.collaborators;\n    const sched = this.state.schedule[this.state.monthIndex] || {};\n    const getShift = (k,id)=> (sched[k] && sched[k][id]!=null) ? sched[k][id] : null;\n\n    let monthWarn = 0;\n    const saturdays = sats.map(s=>{\n      const isQ = qset.has(s.key);\n      let amV=0,pmV=0,cont=0,assigned=0,presAm=0,presPm=0;\n      const counts={AM:0,PM:0,COMPLETO:0,LIBRE:0};\n      collabs.forEach(c=>{\n        const sh=getShift(s.key,c.id);\n        if(sh!=null){ assigned++; counts[sh]++; }\n        if(c.role==='Ventas'){ if(sh==='AM'||sh==='COMPLETO')amV++; if(sh==='PM'||sh==='COMPLETO')pmV++; }\n        if(c.role==='Contabilidad' && sh!=null && sh!=='LIBRE') cont++;\n        if(c.modality==='Presencial'){ if(sh==='AM'||sh==='COMPLETO')presAm++; if(sh==='PM'||sh==='COMPLETO')presPm++; }\n      });\n      const warnAM=assigned>0&&amV===0, warnPM=assigned>0&&pmV===0, warnAcc=isQ&&assigned>0&&cont===0;\n      const warnPresAM=assigned>0&&presAm===0, warnPresPM=assigned>0&&presPm===0;\n      const hasWarn=warnAM||warnPM||warnAcc||warnPresAM||warnPresPM;\n      if(hasWarn) monthWarn++;\n      let statusText, statusColor;\n      if(assigned===0){ statusText='Sin planificar'; statusColor='#94a3b8'; }\n      else if(hasWarn){\n        const p=[]; if(warnAM)p.push('Falta vendedor AM'); if(warnPM)p.push('Falta vendedor PM'); if(warnAcc)p.push('Falta contabilidad'); if(warnPresAM)p.push('Falta presencial AM'); if(warnPresPM)p.push('Falta presencial PM');\n        statusText=p.join(' · '); statusColor='#dc2626';\n      } else { statusText='Cobertura OK'; statusColor='#16a34a'; }\n      return {\n        key:s.key, label:s.label, isQ,\n        headDot: assigned===0?'#cbd5e1':(hasWarn?'#dc2626':'#16a34a'),\n        countsText:`AM ${counts.AM} · PM ${counts.PM} · Comp ${counts.COMPLETO} · Lib ${counts.LIBRE}`,\n        statusText, statusColor,\n      };\n    });\n\n    const rows = collabs.map(c=>{\n      let libre=0;\n      const cells = saturdays.map(s=>{\n        const sh=getShift(s.key,c.id);\n        if(sh==='LIBRE') libre++;\n        const st=this.shiftStyle(sh, colored);\n        return { bg:st.bg, fg:st.fg, border:st.border, label:st.label,\n          full:st.full+' — '+c.name+' · '+s.label,\n          onClick:()=>this.cycleCell(s.key, c.id) };\n      });\n      const rm=this.roleMeta(c.role);\n      const libreColor = libre===1?'#16a34a':(libre===0?'#94a3b8':'#dc2626');\n      if(libre>1) monthWarn++;\n      const isVirtual = c.modality==='Virtual';\n      return { id:c.id, name:c.name, roleDot:rm.dot, roleLabel:c.role, cells, libre, libreColor,\n        isVirtual, modBadge: isVirtual?'Virtual':'' };\n    });\n\n    const anyAssigned = saturdays.some(s=>!s.statusText.startsWith('Sin'));\n    let bannerText, bannerColor, bannerBg, bannerBorder;\n    if(!anyAssigned){\n      bannerText='Mes sin planificar — usa “Sugerir planificación” para una propuesta automática que puedes editar.';\n      bannerColor='#475569'; bannerBg='#f1f5f9'; bannerBorder='#e2e8f0';\n    } else if(monthWarn===0){\n      bannerText='Planificación válida — todos los turnos cumplen las reglas.';\n      bannerColor='#16a34a'; bannerBg='#f0fdf4'; bannerBorder='#bbf7d0';\n    } else {\n      bannerText=monthWarn+' advertencia(s) por resolver en este mes.';\n      bannerColor='#dc2626'; bannerBg='#fef2f2'; bannerBorder='#fecaca';\n    }\n\n    const monthTabs = this.months().map((m,i)=>{\n      const active=i===this.state.monthIndex;\n      return { name:m.name, onClick:()=>this.setState({monthIndex:i}),\n        style: active ? `background:${accent};color:#fff;border:1px solid ${accent}` : 'background:#fff;color:#334155;border:1px solid #e2e8f0' };\n    });\n\n    const isPlan=this.state.view==='plan', isTeam=this.state.view==='team';\n    const navPlanStyle = isPlan ? 'background:#fff;color:var(--accent)' : 'background:rgba(255,255,255,.16);color:#fff';\n    const navTeamStyle = isTeam ? 'background:#fff;color:var(--accent)' : 'background:rgba(255,255,255,.16);color:#fff';\n\n    const roles=['Ventas','Soporte','Contabilidad','Administración'];\n    const roleCounts = roles.map(r=>({ role:r, count:collabs.filter(c=>c.role===r).length, dot:this.roleMeta(r).dot }));\n    const teamRows = collabs.map(c=>({\n      id:c.id, name:c.name, role:c.role, roleDot:this.roleMeta(c.role).dot,\n      modality:c.modality||'Presencial',\n      onName:e=>this.setCollabName(c.id, e.target.value),\n      onRole:e=>this.setCollabRole(c.id, e.target.value),\n      onMod:e=>this.setCollabModality(c.id, e.target.value),\n      onDelete:()=>this.deleteCollab(c.id),\n    }));\n\n    return {\n      accent, rowH, padc,\n      isPlan, isTeam, navPlanStyle, navTeamStyle,\n      onPlan:()=>this.setState({view:'plan'}), onTeam:()=>this.setState({view:'team'}),\n      monthTabs, saturdays, rows,\n      bannerText, bannerColor, bannerBg, bannerBorder,\n      autoPlan:()=>this.autoPlan(), clearMonth:()=>this.clearMonth(), doPrint:()=>window.print(),\n      roleCounts, teamRows,\n      newName:this.state.newName, newRole:this.state.newRole, newModality:this.state.newModality,\n      onNewName:e=>this.setState({newName:e.target.value}),\n      onNewRole:e=>this.setState({newRole:e.target.value}),\n      onNewModality:e=>this.setState({newModality:e.target.value}),\n      addCollab:()=>this.addCollab(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
